<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Farusto</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 50px;
            position: relative;
        }
        .auth-card {
            width: 100%;
            max-width: 500px;
            padding: 40px;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-switch {
            text-align: center;
            margin-top: 20px;
            color: var(--text-muted);
        }
        .auth-switch a {
            color: var(--neon-cyan);
            font-weight: 600;
        }
        .row {
            display: flex;
            gap: 20px;
        }
        .row .form-group {
            flex: 1;
        }
        #signup-error, #signup-success {
            display: none;
            text-align: center;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 5px;
            font-size: 0.9rem;
        }
        #signup-error {
            background: rgba(255, 0, 0, 0.1);
            color: #ff4444;
            border: 1px solid #ff4444;
        }
        #signup-success {
            background: rgba(0, 255, 0, 0.1);
            color: #00ff00;
            border: 1px solid #00ff00;
        }
    </style>
</head>
<body>
    <div class="blob blob-1" style="background: var(--neon-cyan);"></div>
    <div class="blob blob-2" style="background: var(--neon-purple);"></div>

    <!-- Navigation -->
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo text-gradient">Farusto</a>
            <div class="mobile-menu-btn">☰</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="login.html" class="btn btn-primary" style="padding: 8px 20px; font-size: 0.9rem;">Login</a></li>
            </ul>
        </div>
    </header>

    <div class="auth-container">
        <div class="glass-card auth-card reveal">
            <div class="auth-header">
                <h2>Create an Account</h2>
                <p style="color: var(--text-muted);">Join the future of AI today</p>
            </div>
            
            <div id="signup-error"></div>
            <div id="signup-success">Data saving...</div>

            <form id="signup-form">
                <div class="row">
                    <div class="form-group">
                        <label for="fname">First Name</label>
                        <input type="text" id="fname" class="form-control" placeholder="First Name" required>
                    </div>
                    <div class="form-group">
                        <label for="lname">Last Name</label>
                        <input type="text" id="lname" class="form-control" placeholder="Last Name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" class="form-control" placeholder="Enter your phone number" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Create a password" required>
                </div>
                <button type="submit" id="signup-btn" class="btn btn-primary" style="width: 100%; margin-top: 15px;">Sign Up</button>
            </form>
            <div class="auth-switch">
                Already have an account? <a href="login.html">Log In</a>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
    
    <!-- Firebase Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB1hYMIUXPQvftT-5mV4C30oaSLcrLaMNs",
            authDomain: "farusto-b1656.firebaseapp.com",
            projectId: "farusto-b1656",
            storageBucket: "farusto-b1656.firebasestorage.app",
            messagingSenderId: "640310011650",
            appId: "1:640310011650:web:2f55baf0af68fbfbb9841b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const signupForm = document.getElementById('signup-form');
        const errorBox = document.getElementById('signup-error');
        const successBox = document.getElementById('signup-success');
        const submitBtn = document.getElementById('signup-btn');

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorBox.style.display = 'none';
            successBox.style.display = 'none';

            // Configuration is valid

            const fname = document.getElementById('fname').value;
            const lname = document.getElementById('lname').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;

            submitBtn.innerText = "Signing up...";
            submitBtn.disabled = true;

            try {
                // 1. Create User in Firebase Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. Update Display Name
                await updateProfile(user, {
                    displayName: `${fname} ${lname}`
                });

                // 3. Save additional data (phone) to Firestore
                await setDoc(doc(db, "users", user.uid), {
                    firstName: fname,
                    lastName: lname,
                    email: email,
                    phone: phone,
                    createdAt: new Date()
                });

                successBox.innerText = "Account created successfully! Redirecting...";
                successBox.style.display = 'block';
                
                setTimeout(() => {
                    window.location.href = "chatbot.html";
                }, 2000);

            } catch (error) {
                console.error("Signup Error:", error.message);
                errorBox.innerText = error.message;
                errorBox.style.display = 'block';
                submitBtn.innerText = "Sign Up";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
